aid: matplotlib
name: Matplotlib
description: >-
  Matplotlib is a comprehensive open source library for creating static,
  animated, and interactive visualizations in Python. It provides a MATLAB-like
  interface via pyplot and an object-oriented API for full customization of
  publication-quality figures and plots.
